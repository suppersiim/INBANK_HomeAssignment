<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>INBANK LOAN REQUEST</title>
</head>
<body>
<div style="width:100%;max-width:420px;">
    <form id="loan-form">

    <p class="section-title">TAKE LOAN</p>

    <p>INSTRUCTIONS:</p>
    <p>1. Loan amount must be between 2000 and 10000 euros.</p>
    <p>2. Loan period must be between 12 and 60 months.</p>

    <div class="form-row">

        <label for="personal-code">Personal code</label>
        <input type="text" id="personal-code" name="personal-code" required>

    </div>

    <div class="form-row">

        <label for="loan-amount">Loan amount</label>
        <input type="number" id="loan-amount" min="2000" max="10000" required>

    </div>

    <div class="form-row">

        <label for="loan-period">Loan period</label>
        <input type="number" id="loan-period" min="12" max="60" required>

    </div>

    <button id="submit-btn">SUBMIT</button>

    </form>
    <div id="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
